services:
  lean-index:
    build:
      context: .
      dockerfile: packages/lean-index/Dockerfile
    ports:
      - "8460:8460"
    volumes:
      - lean-index-ft-data:/data
      - ./certs:/certs:ro
    environment:
      PORT: "8460"
      DB_PATH: /data/lean-index.db
      TLS_CERT_PATH: /certs/cert.pem
      TLS_KEY_PATH: /certs/key.pem
      LOG_LEVEL: info
      NODE_EXTRA_CA_CERTS: /certs/rootCA.pem
    healthcheck:
      test: ["CMD", "node", "-e", "require('net').connect({port:8460,host:'localhost'}).on('connect',function(){this.end();process.exit(0)}).on('error',()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

